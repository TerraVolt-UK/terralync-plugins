name: Release Plugins

on:
  push:
    tags:
      - 'v*'           # legacy global tags e.g. v1.2.7
      - '*/v*'         # per-plugin tags e.g. axle-energy/v1.1.2

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Get tag version and plugin hint
        id: version
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          # Support per-plugin tags: axle-energy/v1.1.2 → plugin=axle-energy, version=1.1.2
          # Also support legacy global tags: v1.2.7 → plugin=(detected by version match), version=1.2.7
          if [[ "$TAG_NAME" == *"/v"* ]]; then
            echo "plugin_hint=${TAG_NAME%%/v*}" >> $GITHUB_OUTPUT
            echo "version=${TAG_NAME#*/v}" >> $GITHUB_OUTPUT
          else
            echo "plugin_hint=" >> $GITHUB_OUTPUT
            echo "version=${TAG_NAME#v}" >> $GITHUB_OUTPUT
          fi

      - name: Build per-plugin archives and update registry
        id: build
        run: |
          set -e
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${GITHUB_REF_NAME}"
          REPO="${GITHUB_REPOSITORY}"

          mkdir -p dist

          # Find all plugin directories (contain a plugin.json)
          PLUGIN_IDS=""
          for plugin_dir in */; do
            plugin_dir="${plugin_dir%/}"
            if [ -f "${plugin_dir}/plugin.json" ]; then
              PLUGIN_IDS="${PLUGIN_IDS} ${plugin_dir}"
            fi
          done

          echo "Found plugins:${PLUGIN_IDS}"

          # Determine which plugin is being released
          # Prefer per-plugin tag hint (e.g. axle-energy/v1.1.2), fall back to version matching
          PLUGIN_HINT="${{ steps.version.outputs.plugin_hint }}"
          RELEASED_PLUGIN=""
          if [ -n "$PLUGIN_HINT" ] && [ -f "${PLUGIN_HINT}/plugin.json" ]; then
            RELEASED_PLUGIN="${PLUGIN_HINT}"
            echo "Identified release plugin from tag: ${RELEASED_PLUGIN}"
          else
            for plugin_id in $PLUGIN_IDS; do
              plugin_version=$(jq -r '.version' "${plugin_id}/plugin.json" 2>/dev/null || echo "")
              if [ "$plugin_version" = "$VERSION" ]; then
                RELEASED_PLUGIN="${plugin_id}"
                echo "Identified release plugin by version match: ${plugin_id} at version ${plugin_version}"
                break
              fi
            done
          fi

          if [ -z "$RELEASED_PLUGIN" ]; then
            echo "ERROR: No plugin found with version ${VERSION} in plugin.json"
            echo "Available plugins and versions:"
            for plugin_id in $PLUGIN_IDS; do
              plugin_version=$(jq -r '.version' "${plugin_id}/plugin.json" 2>/dev/null || echo "unknown")
              echo "  ${plugin_id}: ${plugin_version}"
            done
            exit 1
          fi

          # Only package the released plugin
          archive_name="${RELEASED_PLUGIN}-${VERSION}.tar.gz"
          echo "Packaging ${RELEASED_PLUGIN} → ${archive_name}"
          tar \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.venv' \
            --exclude='logs' \
            --exclude='plugin_state.json' \
            --exclude='settings.json' \
            -czf "dist/${archive_name}" \
            -C . \
            "${RELEASED_PLUGIN}"
          echo "  Created dist/${archive_name} ($(du -sh dist/${archive_name} | cut -f1))"

          # Rewrite registry.json - only update the released plugin
          python3 - <<PYEOF
          import json, os, hashlib

          version = "${VERSION}"
          tag = "${TAG}"
          repo = "${REPO}"
          released_plugin = "${RELEASED_PLUGIN}"
          base_url = f"https://github.com/{repo}/releases/download/{tag}"

          with open("registry.json") as f:
              registry = json.load(f)

          # Only update the plugin being released
          for plugin in registry["plugins"]:
              if plugin["id"] != released_plugin:
                  print(f"Skipping {plugin['id']} (not the released plugin)")
                  continue

              pid = plugin["id"]
              archive = f"{pid}-{version}.tar.gz"
              archive_path = f"dist/{archive}"

              if not os.path.exists(archive_path):
                  print(f"ERROR: no archive for {pid}")
                  exit(1)

              # Compute SHA-256
              sha256 = hashlib.sha256(open(archive_path, "rb").read()).hexdigest()

              plugin["download_url"] = f"{base_url}/{archive}"
              plugin["checksum_sha256"] = sha256
              plugin["version"] = version
              print(f"Updated {pid}: {plugin['download_url']}")

          with open("registry.json", "w") as f:
              json.dump(registry, f, indent=2)
              f.write("\n")

          print("registry.json updated (only released plugin)")
          PYEOF

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          body: |
            Plugin release ${{ github.ref_name }}

            Individual plugin archives are attached. The `registry.json` in this
            release has been updated with correct per-plugin download URLs and
            SHA-256 checksums.
          generate_release_notes: true

      - name: Commit updated registry.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Stash the updated registry, pull latest main, then re-apply
          cp registry.json /tmp/registry-updated.json
          git fetch origin main
          git checkout origin/main -- registry.json
          cp /tmp/registry-updated.json registry.json
          git add registry.json
          git diff --staged --quiet || git commit -m "chore: update registry.json for ${{ github.ref_name }}"
          git push origin HEAD:main
